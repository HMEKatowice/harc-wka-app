<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inwentarz Harcówki IV SH</title>
<meta name="theme-color" content="#1A3C34">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harcówka IV SH">
<meta name="description" content="Inwentarz harcówki IV Szczepu Harcerskiego">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --dk:#1A3C34; --mg:#2D6A4F; --lg:#52B788; --pg:#D8F3DC;
  --white:#fff; --gl:#F8F9FA; --gm:#DEE2E6; --tx:#212529;
  --A:#2980B9; --B:#8E44AD; --C:#C0392B; --D:#E67E22; --E:#27AE60; --F:#16A085;
  --safe-top: env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gl);color:var(--tx);min-height:100vh}

/* TOAST */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:9px 18px;border-radius:20px;
  font-size:12px;z-index:999;white-space:nowrap;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1}

/* OFFLINE */
#offline-bar{
  display:none;background:#e74c3c;color:#fff;text-align:center;
  font-size:11px;padding:4px;position:sticky;top:0;z-index:200;
}
body.offline #offline-bar{display:block}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--dk),var(--mg));
  color:#fff;padding:0 14px;padding-top:var(--safe-top);
  display:flex;align-items:center;gap:10px;
  height:calc(58px + var(--safe-top));
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.menu-btn{
  display:none;background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:8px;padding:6px 9px;font-size:18px;cursor:pointer;
}
@media(max-width:640px){.menu-btn{display:flex;align-items:center;justify-content:center}}
.logo{font-size:22px}
header h1{font-size:13px;font-weight:700;line-height:1.3}
header p{font-size:10px;opacity:.6}
.spacer{flex:1}
.hbadge{background:rgba(255,255,255,.15);border-radius:14px;padding:3px 9px;font-size:11px;font-weight:600}
.admin-btn{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;
}
#sync-indicator{font-size:10px;opacity:.6;display:none}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 58px - var(--safe-top))}

/* SIDEBAR */
.sidebar{
  width:255px;background:var(--white);
  border-right:1px solid var(--gm);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
  transition:transform .25s;
}
@media(max-width:640px){
  .sidebar{
    position:fixed;top:calc(58px + var(--safe-top));left:0;
    height:calc(100vh - 58px - var(--safe-top));
    transform:translateX(-100%);z-index:90;width:82vw;max-width:300px;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0)}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:89}
  .overlay.show{display:block}
}
.sidebar-top{padding:11px;border-bottom:1px solid var(--gm)}
.search-box{
  width:100%;padding:8px 10px;border:1.5px solid var(--gm);
  border-radius:8px;font-size:14px;outline:none;background:var(--gl);
  transition:border-color .2s;
}
.search-box:focus{border-color:var(--lg);background:#fff}
.filter-row{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.fbtn{
  padding:4px 8px;border-radius:10px;border:1.5px solid var(--gm);
  font-size:10px;font-weight:700;cursor:pointer;background:var(--white);
  transition:all .15s;white-space:nowrap;touch-action:manipulation;
}
.fbtn.active{color:#fff!important;border-color:transparent}
.fbtn[data-z="all"]{color:var(--dk)} .fbtn[data-z="all"].active{background:var(--dk)}
.fbtn[data-z="A"]{color:var(--A)}   .fbtn[data-z="A"].active{background:var(--A)}
.fbtn[data-z="B"]{color:var(--B)}   .fbtn[data-z="B"].active{background:var(--B)}
.fbtn[data-z="C"]{color:var(--C)}   .fbtn[data-z="C"].active{background:var(--C)}
.fbtn[data-z="D"]{color:var(--D)}   .fbtn[data-z="D"].active{background:var(--D)}
.fbtn[data-z="E"]{color:var(--E)}   .fbtn[data-z="E"].active{background:var(--E)}
.fbtn[data-z="F"]{color:var(--F)}   .fbtn[data-z="F"].active{background:var(--F)}

.item-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.item-entry{
  padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--gl);
  transition:background .1s;display:flex;align-items:center;gap:9px;
}
.item-entry:active,.item-entry.active{background:var(--pg)}
.item-entry.active{border-left:3px solid var(--lg)}
.zone-pill{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.item-info .iname{font-size:12px;font-weight:600;line-height:1.3}
.item-info .imeta{font-size:10px;color:#888;margin-top:1px}
.no-res{padding:20px;text-align:center;color:#bbb;font-size:12px}

/* LOADING */
.loading-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;color:#888;font-size:13px;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--gm);
  border-top-color:var(--lg);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:18px;-webkit-overflow-scrolling:touch}

/* OVERVIEW */
.overview{max-width:840px}
.overview h2{font-size:16px;font-weight:700;color:var(--dk);margin-bottom:3px}
.overview .sub{font-size:11px;color:#999;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.scard{background:var(--white);border-radius:10px;padding:12px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid var(--lg)}
.scard .sv{font-size:22px;font-weight:800}
.scard .sl{font-size:10px;color:#666;margin-top:2px}
.zones-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
@media(max-width:580px){.zones-grid{grid-template-columns:1fr 1fr}}
.zone-card{
  background:var(--white);border-radius:11px;padding:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;
  border-left:4px solid;touch-action:manipulation;
  transition:transform .15s;
}
.zone-card:active{transform:scale(.98)}
.zone-card h3{font-size:12px;font-weight:800;margin-bottom:3px}
.zone-card .zdesc{font-size:10px;color:#666;margin-bottom:6px}
.zip{font-size:10px;color:#555;padding:2px 0;border-bottom:1px solid #f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DETAIL */
.detail-card{background:var(--white);border-radius:13px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;max-width:560px}
.dc-header{color:#fff;padding:18px 20px;display:flex;align-items:center;gap:13px}
.dc-icon{width:50px;height:50px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.2);flex-shrink:0}
.dc-title .dname{font-size:17px;font-weight:700}
.dc-title .dlp{font-size:10px;opacity:.6;margin-top:2px}
.dc-body{padding:16px 20px}
.info-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{display:flex;align-items:center;gap:5px;background:var(--gl);border-radius:7px;padding:7px 10px}
.chip .ci{font-size:16px}
.chip .clbl{font-size:9px;color:#888;display:block}
.chip .cval{font-size:12px;font-weight:700}
.lok-trail{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.lok-seg{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;color:#fff}
.lok-arrow{color:#ccc;font-size:11px}
.uwagi-box{background:#FFFBEA;border:1px solid #F0D000;border-radius:7px;padding:9px 12px;font-size:12px;color:#666;display:flex;gap:7px}

/* EDIT BUTTONS on detail */
.detail-actions{display:flex;gap:8px;margin-top:14px}
.btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-edit{background:var(--dk);color:#fff}
.btn-del{background:#fee;color:#c0392b;border:1px solid #fcc}

/* TABS */
.main-tabs{display:flex;margin-bottom:14px;border-bottom:2px solid var(--gm)}
.mtab{padding:8px 13px;cursor:pointer;font-size:12px;font-weight:600;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.mtab.active{color:var(--dk);border-bottom-color:var(--dk)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* TABLE */
.inv-table{width:100%;border-collapse:collapse;font-size:11px}
.inv-table th{background:var(--dk);color:#fff;padding:7px 8px;text-align:left;font-size:10px;position:sticky;top:0}
.inv-table td{padding:6px 8px;border-bottom:1px solid var(--gl)}
.inv-table tr:hover td{background:var(--pg);cursor:pointer}
.inv-table tr.alt td{background:#fafafa}

/* ── ADMIN MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:300;align-items:center;justify-content:center;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:#fff;border-radius:16px;width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.modal-header{
  background:linear-gradient(135deg,var(--dk),var(--mg));
  color:#fff;padding:18px 20px;border-radius:16px 16px 0 0;
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h2{font-size:15px;font-weight:700}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:4px 10px;font-size:16px;cursor:pointer}
.modal-body{padding:20px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:9px 11px;border:1.5px solid var(--gm);border-radius:8px;
  font-size:13px;outline:none;transition:border-color .2s;font-family:inherit;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--lg)}
.form-row textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{padding:0 20px 20px;display:flex;gap:8px;justify-content:flex-end}
.btn-primary{background:var(--dk);color:#fff;padding:9px 20px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.btn-secondary{background:var(--gl);color:var(--tx);padding:9px 16px;border-radius:9px;border:1px solid var(--gm);font-size:13px;cursor:pointer}
.btn-danger{background:#c0392b;color:#fff;padding:9px 16px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer}

/* LOGIN FORM */
.login-form{padding:30px 20px;text-align:center}
.login-form .lock{font-size:48px;margin-bottom:12px}
.login-form h3{font-size:16px;font-weight:700;color:var(--dk);margin-bottom:6px}
.login-form p{font-size:12px;color:#888;margin-bottom:20px}
.login-form input{
  width:100%;padding:10px 14px;border:2px solid var(--gm);border-radius:9px;
  font-size:15px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:12px;
  transition:border-color .2s;
}
.login-form input:focus{border-color:var(--lg)}
.login-form .err{color:#c0392b;font-size:12px;margin-top:6px;display:none}

/* CONFIG HINT */
.config-banner{
  background:#fff8e1;border:1px solid #ffe082;border-radius:10px;
  padding:12px 14px;margin-bottom:16px;font-size:12px;color:#666;
  display:none;
}
.config-banner.show{display:block}
.config-banner strong{color:#e67e22}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gm);border-radius:2px}
</style>
</head>
<body>

<div id="offline-bar">📵 Tryb offline — wyświetlam ostatnio zapisane dane</div>
<div id="toast"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ADMIN MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <!-- content injected by JS -->
  </div>
</div>

<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="logo">🏕️</div>
  <div>
    <h1>Inwentarz Harcówki IV SH</h1>
    <p id="data-info">ładowanie…</p>
  </div>
  <div class="spacer"></div>
  <span id="sync-indicator">⟳ zapisuję…</span>
  <button class="admin-btn" onclick="openAdmin()">⚙️ Edytuj</button>
  <div class="hbadge" id="count-badge">…</div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <input class="search-box" type="search" placeholder="🔍 Szukaj…" id="search" autocomplete="off"/>
      <div class="filter-row">
        <button class="fbtn active" data-z="all">Wszystko</button>
        <button class="fbtn" data-z="A">A 📚</button>
        <button class="fbtn" data-z="B">B ✏️</button>
        <button class="fbtn" data-z="C">C 🧭</button>
        <button class="fbtn" data-z="D">D ⚽</button>
        <button class="fbtn" data-z="E">E 👕</button>
        <button class="fbtn" data-z="F">F 🍽️</button>
      </div>
    </div>
    <div class="item-list" id="item-list">
      <div class="loading-screen"><div class="spinner"></div>Ładuję dane…</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="loading-screen"><div class="spinner"></div>Ładuję inwentarz…</div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════
// KONFIGURACJA — uzupełnij po wdrożeniu
// ══════════════════════════════════════════════════════
const CONFIG = {
  // GitHub repo: "twoja-nazwa/harcowka-ivsh"
  GITHUB_REPO: 'TWOJA-NAZWA/harcowka-ivsh',
  // Plik z danymi w repozytorium
  DATA_FILE: 'data.json',
  // Hasło do panelu edycji (zmień na własne!)
  ADMIN_PASSWORD: 'harcowka2025',
};
// ══════════════════════════════════════════════════════

const ZONES = {
  A:{label:'Strefa A',desc:'Książki, kroniki, gry',            color:'#2980B9',bg:'#D6EAF8',icon:'📚'},
  B:{label:'Strefa B',desc:'Materiały plastyczne i biurowe',   color:'#8E44AD',bg:'#EAD9F5',icon:'✏️'},
  C:{label:'Strefa C',desc:'Wyposażenie terenowe i strzeleckie',color:'#C0392B',bg:'#FAD9D5',icon:'🧭'},
  D:{label:'Strefa D',desc:'Gry, sport i rękodzieło',          color:'#E67E22',bg:'#FAE9D3',icon:'⚽'},
  E:{label:'Strefa E',desc:'Umundurowanie i proporce',         color:'#27AE60',bg:'#D4EFDF',icon:'👕'},
  F:{label:'Strefa F',desc:'Akcje zarobkowe',                  color:'#16A085',bg:'#D0EDE8',icon:'🍽️'},
};

const ICONS={
  'kronika':'📖','książk':'📚','śpiewnik':'🎵','gra':'🎲','mapa':'🗺️',
  'papier':'📄','klej':'🖇️','nożyczki':'✂️','taśma':'📦','zapałki':'🔥',
  'płótna':'🎨','farby':'🎨','kreda':'🖊️','kompas':'🧭','lornetk':'🔭',
  'flaga':'🚩','kamizelk':'🦺','łuk':'🏹','strzał':'🏹','pistol':'🔫',
  'nóż':'🔪','slackline':'🪢','sznurek':'🪢','paracord':'🪢',
  'piłk':'⚽','rakiet':'🏸','frisbee':'🥏','tamburyn':'🥁','klakson':'📣','kręgle':'🎳',
  'mundur':'👕','koszulk':'👕','nakrycie':'🧢','proporce':'🏳️',
  'talerz':'🍽️','kubek':'☕','serwetki':'🧻','sztućce':'🍴',
  'geocaching':'📦','lightstick':'💡','proca':'🏹','tracze':'🎯',
  'drut':'🪡','nitk':'🧵','szyci':'🧵','wełna':'🧶','balony':'🎈','tasiemki':'🎀',
};
function ico(name){const n=name.toLowerCase();for(const[k,v]of Object.entries(ICONS))if(n.includes(k))return v;return'📦'}
const zc=z=>ZONES[z]?.color||'#999';

// ── STATE ─────────────────────────────────────────────
let DATA = [];
let activeFilter='all', activeId=null, fileSHA='', adminUnlocked=false, githubToken='';

// ── TOAST ─────────────────────────────────────────────
function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── OFFLINE ───────────────────────────────────────────
window.addEventListener('online',  ()=>document.body.classList.remove('offline'));
window.addEventListener('offline', ()=>document.body.classList.add('offline'));

// ── SERVICE WORKER ────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`const C='harcowka-v2';
self.addEventListener('install',e=>{self.skipWaiting()});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('api.github.com')||e.request.url.includes('raw.githubusercontent.com'))return;
  e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(c=>c.put(e.request,cl));return r}).catch(()=>caches.match(e.request)));
});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(()=>{});
}

// ── GITHUB API ────────────────────────────────────────
async function fetchData(){
  // 1) Fetch live data via raw.githubusercontent.com (fast, no auth needed for public repos)
  //    Cache-busting param ensures we always get the latest version.
  const rawUrl=`https://raw.githubusercontent.com/${CONFIG.GITHUB_REPO}/main/${CONFIG.DATA_FILE}?_=${Date.now()}`;
  try{
    const r=await fetch(rawUrl);
    if(!r.ok) throw new Error('raw.githubusercontent.com '+r.status);
    const parsed=await r.json();
    DATA=parsed.items||parsed;
    // We also need the SHA for saving — fetch it via API (no body, just metadata)
    fetchSHA();
    localStorage.setItem('harcowka_data', JSON.stringify({data:DATA, ts:Date.now()}));
    document.getElementById('data-info').textContent=
      `Arkusz 2-2025 · ${new Date().toLocaleDateString('pl')}`;
    return true;
  } catch(e){
    console.warn('Raw fetch failed:', e.message);
    // 2) Fallback: localStorage cache (offline)
    const cached=localStorage.getItem('harcowka_data');
    if(cached){
      const{data,ts}=JSON.parse(cached);
      DATA=data;
      fileSHA=localStorage.getItem('harcowka_sha')||'';
      document.body.classList.add('offline');
      document.getElementById('data-info').textContent=
        `Dane z ${new Date(ts).toLocaleDateString('pl')} (offline)`;
      return true;
    }
    // 3) Hardcoded fallback
    DATA=FALLBACK_DATA;
    document.getElementById('data-info').textContent='Dane wbudowane (skonfiguruj GitHub)';
    showConfigBanner();
    return false;
  }
}

async function fetchSHA(){
  // Fetch SHA separately (needed only for saving) — silent, non-blocking
  try{
    const headers={'Accept':'application/vnd.github.v3+json'};
    if(githubToken) headers['Authorization']=`token ${githubToken}`;
    const r=await fetch(
      `https://api.github.com/repos/${CONFIG.GITHUB_REPO}/contents/${CONFIG.DATA_FILE}`,
      {headers}
    );
    if(r.ok){ const j=await r.json(); fileSHA=j.sha; localStorage.setItem('harcowka_sha',fileSHA); }
  } catch(e){ fileSHA=localStorage.getItem('harcowka_sha')||''; }
}

async function saveData(){
  if(!githubToken){
    toast('❌ Brak tokenu GitHub — wpisz token w ustawieniach');
    return false;
  }
  const url=`https://api.github.com/repos/${CONFIG.GITHUB_REPO}/contents/${CONFIG.DATA_FILE}`;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify({items:DATA},null,2))));
  const body={message:`[inwentarz] aktualizacja ${new Date().toLocaleString('pl')}`,content,sha:fileSHA};
  document.getElementById('sync-indicator').style.display='block';
  try{
    const r=await fetch(url,{
      method:'PUT',headers:{'Authorization':`token ${githubToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    const j=await r.json();
    fileSHA=j.content.sha;
    localStorage.setItem('harcowka_data',JSON.stringify({data:DATA,ts:Date.now()}));
    localStorage.setItem('harcowka_sha',fileSHA);
    toast('✅ Zapisano! GitHub Pages zaktualizuje się za ~30 sek.');
    return true;
  } catch(e){
    toast('❌ Błąd zapisu: '+e.message, 4000);
    return false;
  } finally{
    document.getElementById('sync-indicator').style.display='none';
  }
}

function renderList(q='',filter='all'){
  q=q.toLowerCase().trim();
  const list=document.getElementById('item-list');
  list.innerHTML='';
  let n=0;
  const sorted=[...DATA].sort((a,b)=>a.name.localeCompare(b.name,'pl'));
  for(const it of sorted){
    if(filter!=='all'&&it.strefa!==filter)continue;
    if(q&&!it.name.toLowerCase().includes(q)&&!it.lok.toLowerCase().includes(q))continue;
    n++;
    const div=document.createElement('div');
    div.className='item-entry'+(it.lp===activeId?' active':'');
    div.dataset.id=it.lp;
    div.innerHTML=`<div class="zone-pill" style="background:${zc(it.strefa)}">${it.strefa}</div>
      <div class="item-info">
        <div class="iname">${it.name}</div>
        <div class="imeta">📍 ${it.lok}${it.ile?' · 📦 '+it.ile+' szt.':''}</div>
      </div>`;
    div.addEventListener('click',()=>{selectItem(it.lp);closeSidebar()});
    list.appendChild(div);
  }
  if(!n)list.innerHTML='<div class="no-res">Brak wyników</div>';
  document.getElementById('count-badge').textContent=n+' poz.';
}

function selectItem(id){
  activeId=id;
  document.querySelectorAll('.item-entry').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const it=DATA.find(x=>x.lp===id);
  if(it)renderDetail(it);
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));

  const lp=document.getElementById('f-lp2').value.trim()||document.getElementById('f-lp').value;

  const strefa=document.getElementById('f-strefa').value;

  const uwagi=document.getElementById('f-uwagi').value.trim();
  if(!name||!lok){toast('❌ Wypełnij nazwę i lokalizację');return}

  const item={lp,name,strefa,lok,ile,uwagi};
  if(isEdit){
    const idx=DATA.findIndex(x=>x.lp===document.getElementById('f-lp').value);
    if(idx>=0) DATA[idx]=item;
  } else {
    DATA.push(item);
  }

  closeModal();
  const ok=await saveData();
  if(ok){
    activeId=lp;
    renderList(document.getElementById('search').value,activeFilter);
    renderDetail(item);
  }
}

  closeModal();

  const ok=await saveData();

    renderList(document.getElementById('search').value,activeFilter);
    renderOverview();
